    // ─── UTILS ────────────────────────────────────────────────────────────
    function normalizeDate(dateStr) {
      if (!dateStr) return null;
      const s = dateStr.trim();
      // Already YYYY-MM-DD
      if (/^\d{4}-\d{2}-\d{2}$/.test(s)) return new Date(s + 'T00:00:00');
      // M/D/YYYY or MM/DD/YYYY
      const slash = s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
      if (slash) return new Date(`${slash[3]}-${slash[1].padStart(2,'0')}-${slash[2].padStart(2,'0')}T00:00:00`);
      // Fallback: let the browser try
      const d = new Date(s);
      return isNaN(d) ? null : d;
    }
    function formatDate(dateStr) {
      const d = normalizeDate(dateStr);
      return d ? d.toLocaleDateString('en-CA', { month: 'long', day: 'numeric', year: 'numeric' }) : dateStr;
    }
    function formatShortDate(dateStr) {
      const d = normalizeDate(dateStr);
      return d ? d.toLocaleDateString('en-CA', { month: 'short', day: 'numeric' }) : dateStr;
    }

            className={`flex-shrink-0 px-3 py-1 rounded-full text-xs font-semibold border transition-all ${selected ? '' : `${color} border-transparent opacity-80`}`}
            style={selected ? { background: '#6CC24A', color: '#002145', borderColor: '#6CC24A' } : {}}
          >
            {tag}
          </button>
        );
      }
      return (
        <span className={`inline-block px-2 py-0.5 rounded-full text-xs font-semibold ${color}`}>
          {tag}
        </span>
      );
    }

            <div className="px-5 pb-8 pt-2 flex gap-3">
              <button
                onClick={() => setPending([])}
                className="py-3.5 rounded-2xl font-bold text-sm"
                style={{ flex: 1, background: 'var(--input-bg)', color: 'var(--text-muted)', border: '1px solid var(--border)' }}
              >
                Clear
              </button>
              <button
                onClick={() => onApply(pending)}
                className="py-3.5 rounded-2xl font-bold text-sm"
                style={{ flex: 2, background: '#002145', color: '#6CC24A' }}
              >
                Apply Filters{pending.length > 0 ? ` (${pending.length})` : ''}
              </button>
            </div>
          </div>
        </div>
      );
    }

    // ─── TAB: DASHBOARD ───────────────────────────────────────────────────
    const FEED_SECTION_DEFS = [
      { key: 'hiring',     label: '💼 Hiring',        tags: ['#hiring', '#internship'] },
      { key: 'networking', label: '🤝 Networking',    tags: ['#networking', '#gala'] },
      { key: 'casecomps',  label: '📋 Case Comps',    tags: ['#case-comp', '#consulting'] },
      { key: 'deadlines',  label: '📅 Deadlines',     tags: ['#club-deadlines'] },
      { key: 'tech',       label: '💡 Tech',          tags: ['#tech'] },
      { key: 'finance',    label: '📈 Finance',       tags: ['#finance', '#real-estate'] },
    ];

    function DashboardTab({ theme, onToggleTheme, profileName, profilePhoto }) {
      const [search, setSearch] = useState('');
      const [selectedTags, setSelectedTags] = useState([]);
      const [filterOpen, setFilterOpen] = useState(false);
      const [selectedEvent, setSelectedEvent] = useState(null);
      const [selectedClub, setSelectedClub] = useState(null);
      const [activeSection, setActiveSection] = useState('top');
      const sectionRefs = useRef({});
      const feedRef = useRef(null);

      const filtered = useMemo(() => {
        return EVENTS
          .filter(e => {
            const q = search.toLowerCase();
            const matchSearch = !search || e.title.toLowerCase().includes(q) || e.club.toLowerCase().includes(q) || e.description.toLowerCase().includes(q);
            const matchTags = selectedTags.length === 0 || selectedTags.some(t => e.tags.includes(t));
            return matchSearch && matchTags;
          })
          .sort((a, b) => a.date.localeCompare(b.date));
      }, [search, selectedTags]);

      const heroes   = filtered.slice(0, 4);
      const trending = filtered.slice(4, 7);
      const rest     = filtered.slice(7);

      const sections = useMemo(() => {
        const assignedIds = new Set();
        const groups = FEED_SECTION_DEFS.map(def => {
          const events = rest.filter(e => def.tags.some(t => e.tags.includes(t)) && !assignedIds.has(e.id));
          events.forEach(e => assignedIds.add(e.id));
          return { key: def.key, label: def.label, events };
        }).filter(s => s.events.length > 0);
        const others = rest.filter(e => !assignedIds.has(e.id));
        if (others.length > 0) groups.push({ key: 'other', label: '🎓 Other', events: others });
        return groups;
      }, [rest]);

      // Track active section on scroll
      useEffect(() => {
        const feed = feedRef.current;
        if (!feed) return;
        const handleScroll = () => {
          const scrollTop = feed.scrollTop;
          const keys = ['top', ...FEED_SECTION_DEFS.map(d => d.key), 'other'];
          let active = 'top';
          for (const key of keys) {
            const el = sectionRefs.current[key];
            if (el && el.offsetTop - 40 <= scrollTop) active = key;
          }
          setActiveSection(active);
        };
        feed.addEventListener('scroll', handleScroll, { passive: true });
        return () => feed.removeEventListener('scroll', handleScroll);
      }, []);

      const scrollToSection = key => {
        const el = sectionRefs.current[key];
        const feed = feedRef.current;
        if (el && feed) {
          feed.scrollTo({ top: el.offsetTop - 4, behavior: 'smooth' });
          setActiveSection(key);
        }
      };

      return (
        <div className="flex flex-col h-full relative">
          {/* Header */}
          <div className="pt-10 pb-4 px-4 flex-shrink-0" style={{ background: 'var(--header-bg)' }}>
            <div className="flex items-center justify-between mb-3">
              <div>
                <SCLogo />
                <p className="text-xs mt-1" style={{ color: 'rgba(108,194,74,0.7)' }}>UBC Sauder School of Business</p>
              </div>
              <div className="flex items-center gap-2">
                {profilePhoto
                  ? <img src={profilePhoto} alt="Profile" style={{ width: 28, height: 28, borderRadius: '50%', objectFit: 'cover' }} />
                  : <div style={{ width: 28, height: 28, borderRadius: '50%', background: '#6CC24A', display: 'flex', alignItems: 'center', justifyContent: 'center', color: '#002145', fontWeight: 700, fontSize: 12 }}>{(profileName || 'A').charAt(0).toUpperCase()}</div>
                }
                <ThemeToggle theme={theme} onToggle={onToggleTheme} />
              </div>
            </div>
            {/* Search + Filter icon */}
            <div className="flex gap-2 items-center">
              <div className="flex-1 relative">
                <span className="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-sm">🔍</span>
                <input
                  type="text"
                  placeholder="Search events, clubs..."
                  value={search}
                  onChange={e => setSearch(e.target.value)}
                  className="w-full pl-9 pr-4 py-2.5 rounded-xl text-sm focus:outline-none"
                  style={{ background: 'var(--input-bg)', color: 'var(--text-primary)' }}
                />
              </div>
              <button
                onClick={() => setFilterOpen(true)}
                className="relative w-10 h-10 flex items-center justify-center rounded-xl flex-shrink-0"
                style={{ background: 'rgba(255,255,255,0.15)' }}
              >
                <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                  <polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/>
                </svg>
                {selectedTags.length > 0 && (
                  <span className="absolute top-1.5 right-1.5 w-2 h-2 rounded-full" style={{ background: '#6CC24A' }} />
                )}
              </button>
            </div>
          </div>
          {/* Section nav strip */}
          <SectionNavStrip activeSection={activeSection} onSelect={scrollToSection} />
          {/* News feed */}
          <div className="flex-1 overflow-y-auto pb-6" ref={feedRef}>
            {filtered.length === 0 ? (
              <div className="text-center py-16 text-sm" style={{ color: 'var(--text-muted)' }}>
                <p className="text-3xl mb-2">🔍</p>
                No events match your filters.
              </div>
            ) : (
              <>
                {/* Top Stories section */}
                <div ref={el => sectionRefs.current['top'] = el}>
                  {/* Hero carousel */}
                  {heroes.length > 0 && (
                    <div className="pt-4">
                      <div className="flex gap-3 overflow-x-auto scrollbar-hide hero-carousel pb-1 px-4">
                        {heroes.map(event => (
                          <div key={event.id}>
                            <HeroCard event={event} onClick={setSelectedEvent} />
                          </div>
                        ))}
                      </div>
                      <div className="flex justify-center gap-1.5 mt-2.5">
                        {heroes.map((_, i) => (
                          <div key={i} className="rounded-full" style={{ width: i === 0 ? 18 : 6, height: 6, background: i === 0 ? '#6CC24A' : '#002145', opacity: i === 0 ? 1 : 0.25 }} />
                        ))}
                      </div>
                    </div>
                  )}
                  {/* Trending strip */}
                  {trending.length > 0 && (
                    <div className="mt-5 px-4">
                      <div className="mb-3">
                        <span className="font-bold text-sm" style={{ color: 'var(--text-primary)' }}>Trending This Week</span>
                        <div className="h-0.5 w-full mt-1 rounded-full" style={{ background: '#6CC24A' }} />
                      </div>
                      <div className="flex gap-3 overflow-x-auto scrollbar-hide pb-1 -mx-4 px-4">
                        {trending.map(event => (
                          <TrendingCard key={event.id} event={event} onClick={setSelectedEvent} />
                        ))}
                      </div>
                    </div>
                  )}
                </div>

                {/* Section groups */}
                {sections.map(section => (
                  <div key={section.key} className="mt-5 px-4" ref={el => sectionRefs.current[section.key] = el}>
                    <div className="mb-2">
                      <span className="font-bold text-sm" style={{ color: 'var(--text-primary)' }}>{section.label}</span>
                      <div className="h-0.5 w-10 mt-1 rounded-full" style={{ background: '#6CC24A' }} />
                    </div>
                    <div className="rounded-2xl border shadow-sm px-3 divide-y" style={{ background: 'var(--surface)', borderColor: 'var(--border)' }}>
                      {section.events.map(event => (
                        <HeadlineRow key={event.id} event={event} onClick={setSelectedEvent} />
                      ))}
                    </div>
                  </div>
                ))}
              </>
            )}
          </div>
          <FilterModal
            isOpen={filterOpen}
            onClose={() => setFilterOpen(false)}
            selectedTags={selectedTags}
            onApply={tags => { setSelectedTags(tags); setFilterOpen(false); }}
          />
          {selectedEvent && (
            <EventDetailModal event={selectedEvent} onClose={() => setSelectedEvent(null)} onClubClick={club => { setSelectedEvent(null); setSelectedClub(club); }} />
          )}
          {selectedClub && (
            <ClubProfileModal clubKey={selectedClub} onClose={() => setSelectedClub(null)} />
          )}
        </div>
      );
    }

    // ─── TAB: CALENDAR ────────────────────────────────────────────────────
    function CalendarTab({ theme, onToggleTheme }) {
      const [currentDate, setCurrentDate] = useState(new Date(2026, 2, 1));
      const [selectedDay, setSelectedDay] = useState(null);
      const [selectedEvent, setSelectedEvent] = useState(null);
      const [selectedClub, setSelectedClub] = useState(null);

      const year = currentDate.getFullYear();
      const month = currentDate.getMonth();
      const monthLabel = currentDate.toLocaleDateString('en-CA', { month: 'long', year: 'numeric' });
      const firstDow = new Date(year, month, 1).getDay();
      const daysInMonth = new Date(year, month + 1, 0).getDate();

      const eventsByDate = useMemo(() => {
        const map = {};
        EVENTS.forEach(e => {
          const d = normalizeDate(e.date);
          if (!d) return;
          const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
          if (!map[key]) map[key] = [];
          map[key].push(e);
        });
        return map;
      }, []);

      const ds = day => `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
      const TODAY = '2026-03-17';
      const dayEvents = selectedDay ? (eventsByDate[selectedDay] || []) : [];
      const monthEvents = useMemo(() =>
        EVENTS.filter(e => {
          const d = normalizeDate(e.date);
          return d && d.getFullYear() === year && d.getMonth() === month;
        }).sort((a, b) => a.date.localeCompare(b.date))
      , [year, month]);

      return (
        <div className="flex flex-col h-full relative">
          <div className="pt-10 pb-4 px-4 flex-shrink-0" style={{ background: 'var(--header-bg)' }}>
            <div className="flex items-center justify-between mb-2">
              <SCLogo />
              <ThemeToggle theme={theme} onToggle={onToggleTheme} />
            </div>
            <h1 className="text-xl font-bold mt-1" style={{ color: 'var(--header-text)' }}>Calendar</h1>
          </div>
          <div className="flex-1 overflow-y-auto">
            <div className="bg-white mx-4 mt-4 rounded-2xl shadow-sm border border-gray-100 p-4">
              {/* Month nav */}
              <div className="flex items-center justify-between mb-4">
                <button
                  onClick={() => setCurrentDate(new Date(year, month - 1, 1))}
                  className="w-9 h-9 flex items-center justify-center rounded-full hover:bg-gray-100 text-gray-600 text-xl font-light"
                >‹</button>
                <span className="font-bold text-gray-900">{monthLabel}</span>
                <button
                  onClick={() => setCurrentDate(new Date(year, month + 1, 1))}
                  className="w-9 h-9 flex items-center justify-center rounded-full hover:bg-gray-100 text-gray-600 text-xl font-light"
                >›</button>
              </div>
              {/* Day headers */}
              <div className="grid grid-cols-7 mb-1">
                {['S','M','T','W','T','F','S'].map((d, i) => (
                  <div key={i} className="text-center text-xs font-semibold text-gray-400 py-1">{d}</div>
                ))}
              </div>
              {/* Day grid */}
              <div className="grid grid-cols-7 gap-y-1">
                {Array.from({ length: firstDow }).map((_, i) => <div key={`e${i}`} />)}
                {Array.from({ length: daysInMonth }).map((_, i) => {
                  const day = i + 1;
                  const dateStr = ds(day);
                  const hasEvents = !!eventsByDate[dateStr];
                  const isSelected = selectedDay === dateStr;
                  const isToday = dateStr === TODAY;
                  return (
                    <button
                      key={day}
                      onClick={() => setSelectedDay(isSelected ? null : dateStr)}
                      className={`relative flex flex-col items-center justify-center h-9 rounded-xl transition-colors ${
                        isSelected ? '' :
                        isToday ? 'font-bold' :
                        'hover:bg-gray-50 text-gray-700'
                      }`}
                      style={isSelected ? { background: '#002145', color: 'white' } : isToday ? { background: 'var(--today-bg)', color: 'var(--today-text)' } : {}}
                    >
                      <span className={`text-sm ${isSelected || isToday ? 'font-bold' : 'font-medium'}`}>{day}</span>
                      {hasEvents && (
                        <span className={`absolute bottom-1 w-1.5 h-1.5 rounded-full ${isSelected ? 'bg-[#6CC24A]' : 'bg-[#002145]'}`} />
                      )}
                    </button>
                  );
                })}
              </div>
            </div>

            {/* Events section */}
            <div className="px-4 mt-4 pb-6">
              {selectedDay ? (
                <>
                  <div className="flex items-center justify-between mb-3">
                    <h2 className="text-sm font-bold text-gray-500 uppercase tracking-wide">
                      {(normalizeDate(selectedDay) || new Date()).toLocaleDateString('en-CA', { weekday: 'long', month: 'long', day: 'numeric' })}
                    </h2>
                    <button onClick={() => setSelectedDay(null)} className="text-xs font-medium" style={{ color: 'var(--accent)' }}>Clear</button>
                  </div>
                  {dayEvents.length === 0 ? (
                    <div className="text-center text-gray-400 py-10 text-sm bg-white rounded-2xl border border-gray-100">
                      <p className="text-2xl mb-1">📭</p>
                      No events on this day.
                    </div>
                  ) : (
                    <div className="space-y-3">
                      {dayEvents.map(e => <EventCard key={e.id} event={e} onClick={setSelectedEvent} onClubClick={setSelectedClub} />)}
                    </div>
                  )}
                </>
              ) : (
                <>
                  <h2 className="text-sm font-bold text-gray-500 uppercase tracking-wide mb-3">{monthLabel} Events</h2>
                  <div className="space-y-3">
                    {monthEvents.length === 0 ? (
                      <div className="text-center text-gray-400 py-10 text-sm bg-white rounded-2xl border border-gray-100">
                        <p className="text-2xl mb-1">📭</p>
                        No events this month.
                      </div>
                    ) : monthEvents.map(e => <EventCard key={e.id} event={e} onClick={setSelectedEvent} onClubClick={setSelectedClub} />)}
                  </div>
                </>
              )}
            </div>
          </div>
          {selectedEvent && (
            <EventDetailModal event={selectedEvent} onClose={() => setSelectedEvent(null)} onClubClick={club => { setSelectedEvent(null); setSelectedClub(club); }} />
          )}
          {selectedClub && (
            <ClubProfileModal clubKey={selectedClub} onClose={() => setSelectedClub(null)} />
          )}
        </div>
      );
    }

    // ─── TAB: FORUM ───────────────────────────────────────────────────────
    function ForumTab({ theme, onToggleTheme }) {
      const [posts, setPosts] = useState(FORUM_POSTS);
      const [selectedTags, setSelectedTags] = useState([]);
      const [selectedPost, setSelectedPost] = useState(null);
      const [upvoted, setUpvoted] = useState({});
      const [bookmarked, setBookmarked] = useState({});
      const [followed, setFollowed] = useState({});
      const [forumSearch, setForumSearch] = useState('');
      const [specialFilter, setSpecialFilter] = useState(null);
      const [newPostOpen, setNewPostOpen] = useState(false);
      const [npTitle, setNpTitle] = useState('');
      const [npBody, setNpBody] = useState('');
      const [npTag, setNpTag] = useState(ALL_TAGS[0]);
      const [npAnon, setNpAnon] = useState(false);

      const toggleTag = tag => setSelectedTags(p => p.includes(tag) ? p.filter(t => t !== tag) : [...p, tag]);
      const toggleBookmark = (id, e) => { e.stopPropagation(); setBookmarked(b => ({ ...b, [id]: !b[id] })); };
      const toggleFollow = club => setFollowed(f => ({ ...f, [club]: !f[club] }));

      const trending = useMemo(() => [...FORUM_POSTS].sort((a, b) => b.upvotes - a.upvotes).slice(0, 5), []);

      const filtered = useMemo(() => {
        if (specialFilter === 'saved') return posts.filter(p => bookmarked[p.id]);
        if (specialFilter === 'following') return posts.filter(p => p.club && followed[p.club]);
        const q = forumSearch.toLowerCase();
        return posts.filter(p => {
          const matchSearch = !forumSearch || p.title.toLowerCase().includes(q) || p.content.toLowerCase().includes(q);
          const matchTags = selectedTags.length === 0 || selectedTags.includes(p.tag);
          return matchSearch && matchTags;
        });
      }, [posts, specialFilter, bookmarked, followed, forumSearch, selectedTags]);

      const submitPost = () => {
        if (!npTitle.trim()) return;
        const newPost = {
          id: Date.now(), title: npTitle.trim(), tag: npTag,
          author: npAnon ? 'Anonymous' : 'You', timestamp: 'just now',
          upvotes: 0, comments: 0, club: null,
          content: npBody.trim(), replies: [],
        };
        setPosts(p => [newPost, ...p]);
        setNpTitle(''); setNpBody(''); setNpTag(ALL_TAGS[0]); setNpAnon(false);
        setNewPostOpen(false);
      };

      if (selectedPost) {
        const uv = upvoted[selectedPost.id];
        return (
          <div className="flex flex-col h-full">
            <div className="pt-10 pb-4 px-4 flex items-center gap-3 flex-shrink-0" style={{ background: 'var(--header-bg)' }}>
              <button onClick={() => setSelectedPost(null)} className="text-white text-xl w-8 h-8 flex items-center justify-center rounded-full hover:bg-white/10">‹</button>
              <h1 className="text-sm font-semibold flex-1 line-clamp-2 leading-snug" style={{ color: 'var(--header-text)' }}>{selectedPost.title}</h1>
              <ThemeToggle theme={theme} onToggle={onToggleTheme} />
            </div>
            <div className="flex-1 overflow-y-auto">
              <div className="bg-white mx-4 mt-4 rounded-2xl border border-gray-100 shadow-sm p-4">
                {/* Club info row */}
                {selectedPost.club && (
                  <div className="flex items-center gap-2.5 mb-3 pb-3 border-b border-gray-100">
                    <div className="w-8 h-8 rounded-full flex items-center justify-center text-white text-xs font-bold flex-shrink-0" style={{ background: '#002145' }}>
                      {selectedPost.club.slice(0, 2).toUpperCase()}
                    </div>
                    <div className="flex-1 min-w-0">
                      <p className="text-xs font-semibold text-gray-900 truncate">{selectedPost.club}</p>
                      <p className="text-xs text-gray-400">Verified Club</p>
                    </div>
                    <button
                      onClick={() => toggleFollow(selectedPost.club)}
                      className="text-xs font-semibold px-3 py-1 rounded-full flex-shrink-0"
                      style={followed[selectedPost.club]
                        ? { background: '#EEF2FF', color: '#002145', border: '1px solid #002145' }
                        : { background: '#002145', color: '#6CC24A' }}
                    >
                      {followed[selectedPost.club] ? '✓ Following' : '+ Follow'}
                    </button>
                  </div>
                )}
                <div className="flex gap-1.5 flex-wrap mb-3">
                  <TagPill tag={selectedPost.tag} />
                </div>
                <h2 className="font-bold text-gray-900 text-base mb-2 leading-snug">{selectedPost.title}</h2>
                <p className="text-sm text-gray-700 leading-relaxed mb-4 whitespace-pre-line">{selectedPost.content}</p>
                <div className="flex items-center justify-between text-xs text-gray-400 pt-3 border-t border-gray-50">
                  <span className="font-medium">{selectedPost.author} · {selectedPost.timestamp}</span>
                  <div className="flex items-center gap-3">
                    <button
                      className={`flex items-center gap-1 font-semibold transition-colors ${uv ? '' : 'text-gray-400 hover:text-gray-600'}`}
                      style={uv ? { color: 'var(--accent)' } : {}}
                      onClick={() => setUpvoted(u => ({ ...u, [selectedPost.id]: !uv }))}
                    >
                      ▲ {selectedPost.upvotes + (uv ? 1 : 0)}
                    </button>
                    <span>💬 {selectedPost.comments}</span>
                  </div>
                </div>
              </div>
              <div className="px-4 mt-3 pb-6 space-y-2.5">
                <p className="text-xs font-bold text-gray-400 uppercase tracking-widest">{selectedPost.replies.length} Comments</p>
                {selectedPost.replies.map((reply, i) => (
                  <div key={i} className="bg-white rounded-2xl border border-gray-100 shadow-sm p-3.5">
                    <p className="text-sm text-gray-700 leading-relaxed mb-3 whitespace-pre-line">{reply.text}</p>
                    <div className="flex items-center justify-between text-xs text-gray-400">
                      <span className="font-medium">{reply.author} · {reply.timestamp}</span>
                      <span className="font-semibold">▲ {reply.upvotes}</span>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          </div>
        );
      }

      return (
        <div className="flex flex-col h-full relative">
          <div className="pt-10 pb-4 px-4 flex-shrink-0" style={{ background: 'var(--header-bg)' }}>
            <div className="flex items-center justify-between mb-2">
              <SCLogo />
              <ThemeToggle theme={theme} onToggle={onToggleTheme} />
            </div>
            <h1 className="text-xl font-bold mt-1" style={{ color: 'var(--header-text)' }}>Forum</h1>
          </div>
          <div className="bg-white border-b border-gray-100 pt-2.5 pb-1 flex-shrink-0">
            <div className="relative px-4 mb-2">
              <span className="absolute left-7 top-1/2 -translate-y-1/2 text-gray-400 text-sm">🔍</span>
              <input
                type="text"
                placeholder="Search discussions..."
                value={forumSearch}
                onChange={e => setForumSearch(e.target.value)}
                className="w-full pl-9 pr-4 py-2.5 rounded-xl bg-gray-100 text-sm focus:outline-none"
              />
            </div>
            {/* Trending row */}
            <div className="px-4 mb-2">
              <p className="text-xs font-bold text-gray-400 uppercase tracking-widest mb-1.5">Trending now</p>
              <div className="flex gap-2 overflow-x-auto scrollbar-hide pb-1">
                {trending.map(p => (
                  <button
                    key={p.id}
                    onClick={() => setSelectedPost(p)}
                    className="flex-shrink-0 px-3 py-1 rounded-full text-xs font-semibold whitespace-nowrap"
                    style={{ background: 'rgba(108,194,74,0.15)', color: '#002145' }}
                  >
                    ▲{p.upvotes} {p.title.length > 28 ? p.title.slice(0, 28) + '…' : p.title}
                  </button>
                ))}
              </div>
            </div>
            {/* Filter strip: Saved + Following + tag pills */}
            <div className="flex gap-2 overflow-x-auto scrollbar-hide px-4 pb-2">
              {['saved', 'following'].map(f => (
                <button
                  key={f}
                  onClick={() => setSpecialFilter(specialFilter === f ? null : f)}
                  className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-semibold capitalize"
                  style={specialFilter === f
                    ? { background: '#002145', color: '#6CC24A' }
                    : { background: '#F3F4F6', color: '#6B7280' }}
                >
                  {f === 'saved' ? '🔖 Saved' : '⭐ Following'}
                </button>
              ))}
              {ALL_TAGS.map(tag => {
                const active = selectedTags.includes(tag);
                const color = TAG_COLORS[tag] || 'bg-gray-100 text-gray-700';
                return (
                  <button
                    key={tag}
                    onClick={() => { setSpecialFilter(null); toggleTag(tag); }}
                    className={`flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-semibold ${active ? '' : color}`}
                    style={active ? { background: '#002145', color: '#6CC24A' } : {}}
                  >
                    {tag}
                  </button>
                );
              })}
            </div>
          </div>
          {/* Posts list */}
          <div className="flex-1 overflow-y-auto px-4 py-3 space-y-3 pb-20">
            {filtered.length === 0 ? (
              <div className="text-center py-12 text-sm" style={{ color: 'var(--text-muted)' }}>
                <p className="text-3xl mb-2">{specialFilter === 'saved' ? '🔖' : '🔍'}</p>
                {specialFilter === 'saved' ? 'No saved posts yet.' : specialFilter === 'following' ? 'Follow a club to see their posts here.' : 'No posts match your search.'}
              </div>
            ) : filtered.map(post => (
              <button
                key={post.id}
                className="w-full bg-white rounded-2xl border border-gray-100 shadow-sm p-4 text-left active:scale-[0.98] transition-transform relative"
                onClick={() => setSelectedPost(post)}
              >
                {/* Bookmark icon */}
                <button
                  className="absolute top-3 right-3 text-lg z-10"
                  style={{ color: bookmarked[post.id] ? '#6CC24A' : '#D1D5DB' }}
                  onClick={e => toggleBookmark(post.id, e)}
                >
                  🔖
                </button>
                <div className="flex gap-1.5 mb-2 pr-8">
                  <TagPill tag={post.tag} />
                </div>
                <h3 className="font-bold text-gray-900 text-sm mb-1 leading-snug pr-6">{post.title}</h3>
                <p className="text-xs text-gray-500 line-clamp-2 mb-3">{post.content}</p>
                <div className="flex items-center justify-between text-xs text-gray-400">
                  <span className="font-medium">{post.author} · {post.timestamp}</span>
                  <div className="flex items-center gap-3 font-semibold">
                    <button
                      style={upvoted[post.id] ? { color: '#6CC24A' } : { color: '#9CA3AF' }}
                      onClick={e => { e.stopPropagation(); setUpvoted(u => ({ ...u, [post.id]: !u[post.id] })); }}
                    >▲ {post.upvotes + (upvoted[post.id] ? 1 : 0)}</button>
                    <span>💬 {post.comments}</span>
                  </div>
                </div>
              </button>
            ))}
          </div>
          {/* FAB */}
          <button
            onClick={() => setNewPostOpen(true)}
            className="absolute bottom-4 right-4 w-14 h-14 rounded-full flex items-center justify-center shadow-lg z-40"
            style={{ background: '#6CC24A' }}
          >
            <span style={{ color: 'white', fontSize: 28, fontWeight: 300, lineHeight: 1, marginTop: -2 }}>+</span>
          </button>
          {/* New Post modal */}
          {newPostOpen && (
            <div className="absolute inset-0 z-50 flex flex-col justify-end" style={{ background: 'var(--modal-overlay)' }} onClick={() => setNewPostOpen(false)}>
              <div className="rounded-t-3xl p-5" style={{ background: 'var(--surface)' }} onClick={e => e.stopPropagation()}>
                <div className="flex items-center justify-between mb-4">
                  <h2 className="text-base font-bold" style={{ color: 'var(--text-primary)' }}>New Post</h2>
                  <button onClick={() => setNewPostOpen(false)} className="w-8 h-8 flex items-center justify-center rounded-full text-lg" style={{ background: 'var(--border)', color: 'var(--text-muted)' }}>✕</button>
                </div>
                <input
                  type="text"
                  placeholder="Post title..."
                  value={npTitle}
                  onChange={e => setNpTitle(e.target.value)}
                  className="w-full px-4 py-2.5 rounded-xl text-sm mb-3 focus:outline-none"
                  style={{ background: 'var(--input-bg)', color: 'var(--text-primary)', border: '1px solid var(--border)' }}
                />
                <textarea
                  placeholder="Share your thoughts..."
                  value={npBody}
                  onChange={e => setNpBody(e.target.value)}
                  rows={4}
                  className="w-full px-4 py-2.5 rounded-xl text-sm mb-3 focus:outline-none resize-none"
                  style={{ background: 'var(--input-bg)', color: 'var(--text-primary)', border: '1px solid var(--border)' }}
                />
                {/* Tag picker */}
                <div className="flex gap-2 overflow-x-auto scrollbar-hide mb-4">
                  {ALL_TAGS.map(tag => (
                    <button
                      key={tag}
                      onClick={() => setNpTag(tag)}
                      className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-semibold"
                      style={npTag === tag
                        ? { background: '#002145', color: '#6CC24A' }
                        : { background: 'var(--input-bg)', color: 'var(--text-muted)', border: '1px solid var(--border)' }}
                    >
                      {tag}
                    </button>
                  ))}
                </div>
                {/* Anonymity toggle */}
                <div className="flex items-center justify-between mb-5">
                  <div>
                    <p className="text-sm font-semibold" style={{ color: 'var(--text-primary)' }}>Post anonymously</p>
                    <p className="text-xs" style={{ color: 'var(--text-muted)' }}>Your name won't be shown</p>
                  </div>
                  <button
                    onClick={() => setNpAnon(a => !a)}
                    className="relative w-12 h-6 rounded-full transition-colors flex-shrink-0"
                    style={{ background: npAnon ? '#6CC24A' : '#D1D5DB' }}
                  >
                    <span className="absolute top-0.5 w-5 h-5 bg-white rounded-full shadow transition-all" style={{ left: npAnon ? '26px' : '2px' }} />
                  </button>
                </div>
                <button
                  onClick={submitPost}
                  className="w-full py-3 rounded-2xl font-bold text-sm"
                  style={{ background: '#002145', color: '#6CC24A' }}
                >
                  Submit Post
                </button>
              </div>
            </div>
          )}
        </div>
      );
    }

    // ─── TAB: PROFILE ─────────────────────────────────────────────────────
    function ProfileTab({ theme, onToggleTheme, profileName, setProfileName, profilePhoto, setProfilePhoto, profileYear, setProfileYear, profileSpec, setProfileSpec }) {
      const [profileTags, setProfileTags] = useState(['#finance', '#consulting', '#hiring']);
      const [statModal, setStatModal] = useState(null);
      const [editOpen, setEditOpen] = useState(false);
      const [editName, setEditName] = useState(profileName);
      const [editYear, setEditYear] = useState(profileYear);
      const [editSpec, setEditSpec] = useState(profileSpec);
      const fileInputRef = useRef(null);
      const [notifOpen, setNotifOpen] = useState(false);
      const [notifs, setNotifs] = useState({ tags: true, clubApps: true, reminders: false, replies: true, trending: false });
      const [digestOpen, setDigestOpen] = useState(false);
      const [digestEnabled, setDigestEnabled] = useState(true);
      const [digestDay, setDigestDay] = useState('Monday');
      const [feedbackOpen, setFeedbackOpen] = useState(false);
      const [feedbackText, setFeedbackText] = useState('');
      const [feedbackCat, setFeedbackCat] = useState(null);
      const [toast, setToast] = useState(false);

      const toggleTag = tag => setProfileTags(p => p.includes(tag) ? p.filter(t => t !== tag) : [...p, tag]);
      const toggleNotif = key => setNotifs(n => ({ ...n, [key]: !n[key] }));
      const submitFeedback = () => { setFeedbackOpen(false); setFeedbackText(''); setFeedbackCat(null); setToast(true); setTimeout(() => setToast(false), 3000); };

      const YEARS = ['Year 1','Year 2','Year 3','Year 4'];
      const SPECS = ['Accounting','Finance','Marketing','Management','Real Estate','Operations'];

      const openEdit = () => { setEditName(profileName); setEditYear(profileYear); setEditSpec(profileSpec); setEditOpen(true); };
      const saveEdit = () => { if (editName.trim()) setProfileName(editName.trim()); setProfileYear(editYear); setProfileSpec(editSpec); setEditOpen(false); };
      const handlePhotoUpload = e => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = ev => setProfilePhoto(ev.target.result);
        reader.readAsDataURL(file);
      };

      const Avatar = ({ size = 56 }) => profilePhoto
        ? <img src={profilePhoto} alt="Profile" style={{ width: size, height: size, borderRadius: size > 40 ? 16 : '50%', objectFit: 'cover', flexShrink: 0 }} />
        : <div style={{ width: size, height: size, borderRadius: size > 40 ? 16 : '50%', background: '#6CC24A', display: 'flex', alignItems: 'center', justifyContent: 'center', color: '#002145', fontWeight: 700, fontSize: size * 0.4, flexShrink: 0 }}>{(profileName || 'A').charAt(0).toUpperCase()}</div>;

      const BottomSheet = ({ open, onClose, title, children }) => !open ? null : (
        <div className="absolute inset-0 z-50 flex flex-col justify-end" style={{ background: 'var(--modal-overlay)' }} onClick={onClose}>
          <div className="rounded-t-3xl p-5 max-h-[80vh] overflow-y-auto" style={{ background: 'var(--surface)' }} onClick={e => e.stopPropagation()}>
            <div className="flex items-center justify-between mb-4">
              <h2 className="text-base font-bold" style={{ color: 'var(--text-primary)' }}>{title}</h2>
              <button onClick={onClose} className="w-8 h-8 flex items-center justify-center rounded-full text-lg" style={{ background: 'var(--border)', color: 'var(--text-muted)' }}>✕</button>
            </div>
            {children}
          </div>
        </div>
      );

      return (
        <div className="flex flex-col h-full relative">
          <div className="pt-10 pb-6 px-4 flex-shrink-0" style={{ background: 'var(--header-bg)' }}>
            <div className="flex items-center justify-between mb-3">
              <SCLogo />
              <ThemeToggle theme={theme} onToggle={onToggleTheme} />
            </div>
            <div className="flex items-center gap-4">
              <Avatar size={56} />
              <div>
                <h1 className="text-white text-lg font-bold leading-tight">{profileName}</h1>
                <p className="text-[#6CC24A] text-sm font-medium">{profileYear} · {profileSpec}</p>
                <p className="text-blue-300 text-xs mt-0.5">UBC Sauder School of Business</p>
              </div>
            </div>
          </div>

          <div className="flex-1 overflow-y-auto">
            {/* Stats */}
            <div className="mx-4 mt-4 grid grid-cols-3 gap-2.5">
              {[
                { label: "Events RSVP'd", value: '4', modal: 'events' },
                { label: 'Forum Posts', value: '2', modal: 'posts' },
                { label: 'Clubs Joined', value: '3', modal: 'clubs' },
              ].map(({ label, value, modal }) => (
                <button key={label} onClick={() => setStatModal(modal)} className="bg-white rounded-2xl border border-gray-100 shadow-sm p-3 text-center active:scale-95 transition-transform">
                  <p className="text-2xl font-bold" style={{ color: 'var(--accent)' }}>{value}</p>
                  <p className="text-xs text-gray-500 mt-0.5 leading-tight">{label}</p>
                </button>
              ))}
            </div>

            {/* Tag preferences */}
            <div className="bg-white mx-4 mt-3 rounded-2xl border border-gray-100 shadow-sm p-4">
              <h2 className="font-bold text-gray-900 text-sm mb-0.5">My Interests</h2>
              <p className="text-xs text-gray-500 mb-3">Your selected tags prioritize what you see in the dashboard.</p>
              <div className="flex flex-wrap gap-2">
                {ALL_TAGS.map(tag => {
                  const color = TAG_COLORS[tag] || 'bg-gray-100 text-gray-700';
                  const active = profileTags.includes(tag);
                  return (
                    <button
                      key={tag}
                      onClick={() => toggleTag(tag)}
                      className={`px-3 py-1.5 rounded-full text-xs font-semibold border-2 transition-all ${active ? '' : `${color} border-transparent`}`}
                      style={active ? { background: '#6CC24A', color: '#002145', borderColor: '#6CC24A' } : {}}
                    >
                      {tag}
                    </button>
                  );
                })}
              </div>
            </div>

            {/* Settings items */}
            <div className="bg-white mx-4 mt-3 rounded-2xl border border-gray-100 shadow-sm divide-y divide-gray-50 mb-6">
              {[
                { icon: '🔔', label: 'Notifications', desc: 'Alerts for events matching your tags', action: () => setNotifOpen(true) },
                { icon: '📧', label: 'Email Digest', desc: 'Weekly summary of upcoming events', action: () => setDigestOpen(true) },
                { icon: '✏️', label: 'Edit Profile', desc: 'Update your name, year, or specialization', action: openEdit },
                { icon: '🎓', label: 'My Clubs', desc: 'View and manage your club memberships', action: () => setStatModal('clubs') },
                { icon: '❓', label: 'Help & Feedback', desc: 'Report issues or share ideas', action: () => setFeedbackOpen(true) },
              ].map(({ icon, label, desc, action }) => (
                <button key={label} onClick={action || undefined} className="w-full flex items-center gap-3 px-4 py-3.5 text-left hover:bg-gray-50 transition-colors">
                  <span className="text-xl">{icon}</span>
                  <div className="flex-1">
                    <p className="text-sm font-semibold text-gray-900">{label}</p>
                    <p className="text-xs text-gray-400 mt-0.5">{desc}</p>
                  </div>
                  <span className="text-gray-300 text-lg">›</span>
                </button>
              ))}
            </div>
          </div>

          {/* Events modal */}
          <BottomSheet open={statModal === 'events'} onClose={() => setStatModal(null)} title="Events RSVP'd">
            <div className="space-y-3">
              {EVENTS.slice(0, 4).map(e => (
                <div key={e.id} className="flex gap-3 items-start p-3 rounded-2xl" style={{ background: 'var(--input-bg)' }}>
                  <div className="w-10 h-10 rounded-xl flex items-center justify-center text-lg flex-shrink-0" style={{ background: 'rgba(0,33,69,0.08)' }}>{e.emoji}</div>
                  <div className="flex-1 min-w-0">
                    <p className="text-sm font-semibold text-gray-900 leading-tight">{e.title}</p>
                    <p className="text-xs text-gray-400 mt-0.5">{e.date} · {e.club}</p>
                  </div>
                </div>
              ))}
            </div>
          </BottomSheet>

          {/* Posts modal */}
          <BottomSheet open={statModal === 'posts'} onClose={() => setStatModal(null)} title="My Forum Posts">
            <div className="space-y-3">
              {[
                { title: 'Is Finance Club worth it in first year?', tag: '#finance', upvotes: 54, timestamp: '4d ago' },
                { title: 'Anyone going to the Deloitte info session?', tag: '#hiring', upvotes: 28, timestamp: '5h ago' },
              ].map((post, i) => (
                <div key={i} className="p-3 rounded-2xl" style={{ background: 'var(--input-bg)' }}>
                  <p className="text-xs font-semibold mb-1" style={{ color: 'var(--accent)' }}>{post.tag}</p>
                  <p className="text-sm font-semibold text-gray-900 leading-tight">{post.title}</p>
                  <p className="text-xs text-gray-400 mt-1">▲ {post.upvotes} · {post.timestamp}</p>
                </div>
              ))}
            </div>
          </BottomSheet>

          {/* Clubs modal */}
          <BottomSheet open={statModal === 'clubs'} onClose={() => setStatModal(null)} title="Clubs Joined">
            <div className="space-y-3">
              {['UBC Finance Club', 'UBC Consulting Club', 'Sauder Marketing & Entrepreneurship Club'].map(club => (
                <div key={club} className="flex items-center gap-3 p-3 rounded-2xl" style={{ background: 'var(--input-bg)' }}>
                  <div className="w-10 h-10 rounded-xl flex items-center justify-center text-white text-xs font-bold flex-shrink-0" style={{ background: '#002145' }}>
                    {(CLUBS[club]?.initial || club.slice(0, 2)).toUpperCase()}
                  </div>
                  <div className="flex-1 min-w-0">
                    <p className="text-sm font-semibold text-gray-900 leading-tight">{club}</p>
                    <p className="text-xs" style={{ color: 'var(--accent)' }}>Member</p>
                  </div>
                  <span className="text-xs font-semibold px-2.5 py-1 rounded-full" style={{ background: 'rgba(108,194,74,0.15)', color: '#002145' }}>Following</span>
                </div>
              ))}
            </div>
          </BottomSheet>

          {/* Toast */}
          {toast && (
            <div className="absolute top-16 left-4 right-4 z-50 py-3 px-4 rounded-2xl text-sm font-semibold text-center" style={{ background: '#6CC24A', color: '#002145' }}>
              Thanks for your feedback! 🎉
            </div>
          )}

          {/* Notifications modal */}
          <BottomSheet open={notifOpen} onClose={() => setNotifOpen(false)} title="Notifications">
            <div className="space-y-4">
              <div>
                <p className="text-xs font-bold uppercase tracking-widest text-gray-400 mb-3">Event Alerts</p>
                <div className="space-y-3">
                  {[
                    { key: 'tags', label: 'Events matching my tags' },
                    { key: 'clubApps', label: 'New club applications open' },
                    { key: 'reminders', label: 'Event reminders (1 day before)' },
                  ].map(({ key, label }) => (
                    <div key={key} className="flex items-center justify-between">
                      <span className="text-sm font-medium" style={{ color: 'var(--text-primary)' }}>{label}</span>
                      <button onClick={() => toggleNotif(key)} className="relative w-12 h-6 rounded-full flex-shrink-0 transition-colors" style={{ background: notifs[key] ? '#6CC24A' : '#D1D5DB' }}>
                        <span className="absolute top-0.5 w-5 h-5 bg-white rounded-full shadow transition-all" style={{ left: notifs[key] ? '26px' : '2px' }} />
                      </button>
                    </div>
                  ))}
                </div>
              </div>
              <div className="pt-3 border-t border-gray-100">
                <p className="text-xs font-bold uppercase tracking-widest text-gray-400 mb-3">Forum Alerts</p>
                <div className="space-y-3">
                  {[
                    { key: 'replies', label: 'Replies to my posts' },
                    { key: 'trending', label: 'Trending posts in my threads' },
                  ].map(({ key, label }) => (
                    <div key={key} className="flex items-center justify-between">
                      <span className="text-sm font-medium" style={{ color: 'var(--text-primary)' }}>{label}</span>
                      <button onClick={() => toggleNotif(key)} className="relative w-12 h-6 rounded-full flex-shrink-0 transition-colors" style={{ background: notifs[key] ? '#6CC24A' : '#D1D5DB' }}>
                        <span className="absolute top-0.5 w-5 h-5 bg-white rounded-full shadow transition-all" style={{ left: notifs[key] ? '26px' : '2px' }} />
                      </button>
                    </div>
                  ))}
                </div>
              </div>
            </div>
          </BottomSheet>

          {/* Email Digest modal */}
          <BottomSheet open={digestOpen} onClose={() => setDigestOpen(false)} title="Email Digest">
            <div className="space-y-4">
              <div className="flex items-center justify-between">
                <div>
                  <p className="text-sm font-semibold" style={{ color: 'var(--text-primary)' }}>Enable weekly email digest</p>
                  <p className="text-xs mt-0.5" style={{ color: 'var(--text-muted)' }}>Get a weekly summary of events and news</p>
                </div>
                <button onClick={() => setDigestEnabled(d => !d)} className="relative w-12 h-6 rounded-full flex-shrink-0 transition-colors" style={{ background: digestEnabled ? '#6CC24A' : '#D1D5DB' }}>
                  <span className="absolute top-0.5 w-5 h-5 bg-white rounded-full shadow transition-all" style={{ left: digestEnabled ? '26px' : '2px' }} />
                </button>
              </div>
              {digestEnabled && (
                <>
                  <div>
                    <label className="text-xs font-semibold mb-1 block" style={{ color: 'var(--text-muted)' }}>Send every</label>
                    <select value={digestDay} onChange={e => setDigestDay(e.target.value)} className="w-full px-4 py-2.5 rounded-xl text-sm focus:outline-none" style={{ background: 'var(--input-bg)', color: 'var(--text-primary)', border: '1px solid var(--border)' }}>
                      {['Monday','Wednesday','Friday'].map(d => <option key={d} value={d}>{d}</option>)}
                    </select>
                  </div>
                  <div className="rounded-2xl p-4" style={{ background: 'var(--input-bg)', border: '1px solid var(--border)' }}>
                    <p className="text-xs font-bold mb-2 uppercase tracking-widest" style={{ color: 'var(--text-muted)' }}>Preview</p>
                    <p className="text-sm font-bold mb-2" style={{ color: 'var(--text-primary)' }}>This week at Commerce Central</p>
                    {EVENTS.slice(0, 3).map(e => (
                      <p key={e.id} className="text-xs mb-1" style={{ color: 'var(--text-muted)' }}>• {e.title} — {e.date}</p>
                    ))}
                  </div>
                </>
              )}
            </div>
          </BottomSheet>

          {/* Help & Feedback modal */}
          <BottomSheet open={feedbackOpen} onClose={() => setFeedbackOpen(false)} title="Help & Feedback">
            <div>
              <div className="flex gap-2 mb-3">
                {[['🐛','Bug Report'],['💡','Feature Idea'],['❓','Question']].map(([emoji, cat]) => (
                  <button
                    key={cat}
                    onClick={() => setFeedbackCat(feedbackCat === cat ? null : cat)}
                    className="flex-1 py-2 rounded-xl text-xs font-semibold"
                    style={feedbackCat === cat ? { background: '#002145', color: '#6CC24A' } : { background: 'var(--input-bg)', color: 'var(--text-muted)', border: '1px solid var(--border)' }}
                  >
                    {emoji} {cat}
                  </button>
                ))}
              </div>
              <textarea
                placeholder="Describe your issue or idea..."
                value={feedbackText}
                onChange={e => setFeedbackText(e.target.value)}
                rows={5}
                className="w-full px-4 py-2.5 rounded-xl text-sm mb-4 focus:outline-none resize-none"
                style={{ background: 'var(--input-bg)', color: 'var(--text-primary)', border: '1px solid var(--border)' }}
              />
              <button onClick={submitFeedback} className="w-full py-3 rounded-2xl font-bold text-sm" style={{ background: '#002145', color: '#6CC24A' }}>
                Submit Feedback
              </button>
            </div>
          </BottomSheet>

          {/* Edit Profile modal */}
          {editOpen && (
            <div className="absolute inset-0 z-50 flex flex-col justify-end" style={{ background: 'var(--modal-overlay)' }} onClick={() => setEditOpen(false)}>
              <div className="rounded-t-3xl p-5" style={{ background: 'var(--surface)' }} onClick={e => e.stopPropagation()}>
                <div className="flex items-center justify-between mb-5">
                  <h2 className="text-base font-bold" style={{ color: 'var(--text-primary)' }}>Edit Profile</h2>
                  <button onClick={() => setEditOpen(false)} className="w-8 h-8 flex items-center justify-center rounded-full text-lg" style={{ background: 'var(--border)', color: 'var(--text-muted)' }}>✕</button>
                </div>
                {/* Photo upload */}
                <div className="flex justify-center mb-5">
                  <div className="relative">
                    {profilePhoto
                      ? <img src={profilePhoto} alt="Profile" style={{ width: 80, height: 80, borderRadius: '50%', objectFit: 'cover' }} />
                      : <div style={{ width: 80, height: 80, borderRadius: '50%', background: '#6CC24A', display: 'flex', alignItems: 'center', justifyContent: 'center', color: '#002145', fontWeight: 700, fontSize: 32 }}>{(profileName || 'A').charAt(0)}</div>
                    }
                    <button
                      onClick={() => fileInputRef.current?.click()}
                      className="absolute bottom-0 right-0 w-7 h-7 rounded-full flex items-center justify-center font-bold shadow-md"
                      style={{ background: '#6CC24A', color: '#002145', fontSize: 18 }}
                    >+</button>
                    <input ref={fileInputRef} type="file" accept="image/*" className="hidden" onChange={handlePhotoUpload} />
                  </div>
                </div>
                <div className="mb-3">
                  <label className="text-xs font-semibold mb-1 block" style={{ color: 'var(--text-muted)' }}>Name</label>
                  <input
                    type="text"
                    value={editName}
                    onChange={e => setEditName(e.target.value)}
                    className="w-full px-4 py-2.5 rounded-xl text-sm focus:outline-none"
                    style={{ background: 'var(--input-bg)', color: 'var(--text-primary)', border: '1px solid var(--border)' }}
                  />
                </div>
                <div className="mb-3">
                  <label className="text-xs font-semibold mb-1 block" style={{ color: 'var(--text-muted)' }}>Year</label>
                  <select
                    value={editYear}
                    onChange={e => setEditYear(e.target.value)}
                    className="w-full px-4 py-2.5 rounded-xl text-sm focus:outline-none"
                    style={{ background: 'var(--input-bg)', color: 'var(--text-primary)', border: '1px solid var(--border)' }}
                  >
                    {YEARS.map(y => <option key={y} value={y}>{y}</option>)}
                  </select>
                </div>
                <div className="mb-5">
                  <label className="text-xs font-semibold mb-1 block" style={{ color: 'var(--text-muted)' }}>Specialization</label>
                  <select
                    value={editSpec}
                    onChange={e => setEditSpec(e.target.value)}
                    className="w-full px-4 py-2.5 rounded-xl text-sm focus:outline-none"
                    style={{ background: 'var(--input-bg)', color: 'var(--text-primary)', border: '1px solid var(--border)' }}
                  >
                    {SPECS.map(s => <option key={s} value={s}>{s}</option>)}
                  </select>
                </div>
                <button
                  onClick={saveEdit}
                  className="w-full py-3 rounded-2xl font-bold text-sm"
                  style={{ background: '#002145', color: '#6CC24A' }}
                >
                  Save Changes
                </button>
              </div>
            </div>
          )}
        </div>
      );
    }

    // ─── BOTTOM NAV ───────────────────────────────────────────────────────
    const NAV_ICONS = {
      dashboard: {
        filled: (
          <svg viewBox="0 0 24 24" width="26" height="26" fill="currentColor">
            <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/>
          </svg>
        ),
        outline: (
          <svg viewBox="0 0 24 24" width="26" height="26" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">
            <path d="M3 12l9-9 9 9v8a1 1 0 0 1-1 1h-4v-5H8v5H4a1 1 0 0 1-1-1z"/>
          </svg>
        ),
      },
      calendar: {
        filled: (
          <svg viewBox="0 0 24 24" width="26" height="26" fill="currentColor">
            <path d="M20 3h-1V1h-2v2H7V1H5v2H4C2.9 3 2 3.9 2 5v16c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 18H4V8h16v13z"/>
          </svg>
        ),
        outline: (
          <svg viewBox="0 0 24 24" width="26" height="26" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">
            <rect x="3" y="4" width="18" height="18" rx="2"/>
            <line x1="16" y1="2" x2="16" y2="6"/>
            <line x1="8" y1="2" x2="8" y2="6"/>
            <line x1="3" y1="10" x2="21" y2="10"/>
          </svg>
        ),
      },
      forum: {
        filled: (
          <svg viewBox="0 0 24 24" width="26" height="26" fill="currentColor">
            <path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/>
          </svg>
        ),
        outline: (
          <svg viewBox="0 0 24 24" width="26" height="26" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
          </svg>
        ),
      },
      profile: {
        filled: (
          <svg viewBox="0 0 24 24" width="26" height="26" fill="currentColor">
            <path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/>
          </svg>
        ),
        outline: (
          <svg viewBox="0 0 24 24" width="26" height="26" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
            <circle cx="12" cy="7" r="4"/>
          </svg>
        ),
      },
    };

    function BottomNav({ activeTab, onTabChange }) {
      const tabs = [
        { id: 'dashboard' },
        { id: 'calendar' },
        { id: 'forum' },
        { id: 'profile' },
      ];
      return (
        <div
          className="flex-shrink-0 flex justify-around items-center"
          style={{
            height: 68,
            background: 'var(--surface)',
            borderTop: '1.5px solid var(--border)',
            boxShadow: '0 -1px 8px rgba(0,0,0,0.06)',
          }}
        >
          {tabs.map(tab => {
            const active = activeTab === tab.id;
            const icons = NAV_ICONS[tab.id];
            return (
              <button
                key={tab.id}
                onClick={() => onTabChange(tab.id)}
                className="flex items-center justify-center"
                style={{
                  flex: 1,
                  height: '100%',
                  color: active ? 'var(--accent)' : '#9CA3AF',
                  background: 'none',
                  border: 'none',
                  cursor: 'pointer',
                  padding: 0,
                }}
              >
                {active ? icons.filled : icons.outline}
              </button>
            );
          })}
        </div>
      );
    }

    // ─── SETUP SCREEN ─────────────────────────────────────────────────────
    function SetupScreen({ onDone }) {
      const [selected, setSelected] = useState(null);
      const [step, setStep] = useState(1);
      const [clubName, setClubName] = useState('');
      const [clubCategory, setClubCategory] = useState(ALL_TAGS[0]);
      const [clubDesc, setClubDesc] = useState('');
      const [submitted, setSubmitted] = useState(false);

      const handleStart = () => {
        if (!selected) return;
        if (selected === 'student') { try { localStorage.setItem('cc-setup-done', '1'); } catch {} onDone(); }
        else setStep(2);
      };
      const handleApply = () => {
        setSubmitted(true);
        setTimeout(() => { try { localStorage.setItem('cc-setup-done', '1'); } catch {} onDone(); }, 2000);
      };

      if (step === 2) return (
        <div style={{ minHeight: '100dvh', background: 'var(--bg)', display: 'flex', justifyContent: 'center' }}>
          <div style={{ width: '100%', maxWidth: 430, height: '100dvh', display: 'flex', flexDirection: 'column', background: 'var(--surface)', padding: '0 24px', boxSizing: 'border-box' }}>
            <div style={{ flex: 1, overflowY: 'auto', paddingTop: 60, paddingBottom: 40 }}>
              <button onClick={() => setStep(1)} style={{ color: 'var(--text-muted)', fontSize: 14, marginBottom: 24, display: 'flex', alignItems: 'center', gap: 4, background: 'none', border: 'none', cursor: 'pointer', padding: 0 }}>‹ Back</button>
              <h2 style={{ color: 'var(--text-primary)', fontWeight: 700, fontSize: 20, marginBottom: 6 }}>Club details</h2>
              <p style={{ color: 'var(--text-muted)', fontSize: 14, marginBottom: 24 }}>Tell us about your club so we can verify you.</p>
              <div style={{ marginBottom: 16 }}>
                <label style={{ display: 'block', fontSize: 12, fontWeight: 600, color: 'var(--text-muted)', marginBottom: 4 }}>Club Name</label>
                <input type="text" placeholder="e.g. UBC Finance Club" value={clubName} onChange={e => setClubName(e.target.value)}
                  style={{ width: '100%', padding: '10px 16px', borderRadius: 12, fontSize: 14, background: 'var(--input-bg)', color: 'var(--text-primary)', border: '1px solid var(--border)', boxSizing: 'border-box', outline: 'none' }} />
              </div>
              <div style={{ marginBottom: 16 }}>
                <label style={{ display: 'block', fontSize: 12, fontWeight: 600, color: 'var(--text-muted)', marginBottom: 4 }}>Category</label>
                <select value={clubCategory} onChange={e => setClubCategory(e.target.value)}
                  style={{ width: '100%', padding: '10px 16px', borderRadius: 12, fontSize: 14, background: 'var(--input-bg)', color: 'var(--text-primary)', border: '1px solid var(--border)', boxSizing: 'border-box', outline: 'none' }}>
                  {ALL_TAGS.map(t => <option key={t} value={t}>{t}</option>)}
                </select>
              </div>
              <div style={{ marginBottom: 24 }}>
                <label style={{ display: 'block', fontSize: 12, fontWeight: 600, color: 'var(--text-muted)', marginBottom: 4 }}>Description</label>
                <textarea placeholder="Describe your club..." value={clubDesc} onChange={e => setClubDesc(e.target.value)} rows={4}
                  style={{ width: '100%', padding: '10px 16px', borderRadius: 12, fontSize: 14, background: 'var(--input-bg)', color: 'var(--text-primary)', border: '1px solid var(--border)', boxSizing: 'border-box', resize: 'none', outline: 'none' }} />
              </div>
              {submitted
                ? <div style={{ textAlign: 'center', padding: '16px', background: 'rgba(108,194,74,0.15)', borderRadius: 16, color: '#002145', fontWeight: 600, fontSize: 14 }}>Application submitted! ✅</div>
                : <button onClick={handleApply} style={{ width: '100%', padding: '14px', borderRadius: 16, background: '#002145', color: '#6CC24A', fontWeight: 700, fontSize: 14, border: 'none', cursor: 'pointer', boxSizing: 'border-box' }}>Apply for Verification</button>
              }
            </div>
          </div>
        </div>
      );

      return (
        <div style={{ minHeight: '100dvh', background: 'var(--bg)', display: 'flex', justifyContent: 'center' }}>
          <div style={{ width: '100%', maxWidth: 430, height: '100dvh', display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', padding: '0 24px', background: 'var(--surface)', boxSizing: 'border-box' }}>
            <div style={{ marginBottom: 8 }}><SCLogo /></div>
            <p style={{ color: 'var(--text-muted)', fontSize: 14, marginBottom: 48, textAlign: 'center' }}>Your Sauder hub, all in one place</p>
            <p style={{ color: 'var(--text-primary)', fontWeight: 700, fontSize: 17, marginBottom: 20, textAlign: 'center' }}>How are you joining Commerce Central?</p>
            <div style={{ display: 'flex', gap: 12, width: '100%', marginBottom: 32 }}>
              {[
                { id: 'student', emoji: '🎓', label: 'Student', sub: "I'm a Sauder undergraduate" },
                { id: 'club', emoji: '🏛', label: 'Club / Org', sub: 'I represent a Sauder club' },
              ].map(({ id, emoji, label, sub }) => (
                <button key={id} onClick={() => setSelected(id)} style={{
                  flex: 1, padding: '20px 12px', borderRadius: 20, background: 'var(--surface)',
                  border: `2px solid ${selected === id ? '#6CC24A' : 'var(--border)'}`,
                  boxShadow: selected === id ? '0 0 0 3px rgba(108,194,74,0.15)' : 'none',
                  display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 8, cursor: 'pointer',
                }}>
                  <span style={{ fontSize: 32 }}>{emoji}</span>
                  <span style={{ color: 'var(--text-primary)', fontWeight: 700, fontSize: 15 }}>{label}</span>
                  <span style={{ color: 'var(--text-muted)', fontSize: 12, textAlign: 'center', lineHeight: 1.3 }}>{sub}</span>
                </button>
              ))}
            </div>
            <button onClick={handleStart} style={{ width: '100%', padding: '14px', borderRadius: 16, background: selected ? '#002145' : '#E5E7EB', color: selected ? '#6CC24A' : '#9CA3AF', fontWeight: 700, fontSize: 15, border: 'none', cursor: selected ? 'pointer' : 'default', boxSizing: 'border-box' }}>
              Get Started →
            </button>
          </div>
        </div>
      );
    }

    // ─── DATA LOADER ──────────────────────────────────────────────────────
    function DataLoader({ children }) {
      const [status, setStatus] = useState('loading');

      useEffect(() => {
        Promise.all([
          fetch(SCRIPT_URL + '?sheet=clubs').then(r => r.json()),
          fetch(SCRIPT_URL + '?sheet=Events').then(r => r.json()),
        ])
          .then(([clubRows, eventRows]) => {
            const clubs = {};
            clubRows.forEach(row => {
              const name = row.name;
              if (!name) return;
              clubs[name] = {
                name,
                tagline:     row.tagline     || '',
                description: row.description || '',
                who:         row.who         || '',
                website:     row.website     || '#',
                tags:        (row.tags || '').split(',').map(t => t.trim()).filter(Boolean),
                initial:     row.initial     || name.slice(0, 2).toUpperCase(),
              };
            });
            CLUBS = clubs;
            EVENTS = eventRows.map((row, i) => ({
              id:          parseInt(row.id) || (i + 1),
              title:       row.title       || '',
              club:        row.club        || '',
              tags:        (row.tags || '').split(',').map(t => t.trim()).filter(Boolean),
              date:        row.date        || '',
              time:        row.time        || '',
              location:    row.location    || '',
              description: row.description || '',
              link:        row.link        || '#',
            }));
            setStatus('ready');
          })
          .catch((err) => {
            console.error('[data fetch error]', err);
            CLUBS  = {};
            EVENTS = [];
            setStatus('error');
          });
      }, []);

      if (status === 'loading') {
        return (
          <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', height: '100dvh', background: 'var(--bg)' }}>
            <div style={{ textAlign: 'center' }}>
              <div style={{ width: 32, height: 32, border: '3px solid var(--border)', borderTopColor: 'var(--accent)', borderRadius: '50%', animation: 'spin 0.8s linear infinite', margin: '0 auto 12px' }} />
              <p style={{ color: 'var(--text-muted)', fontSize: 14, margin: 0 }}>Loading...</p>
            </div>
          </div>
        );
      }

      return (
        <>
          {status === 'error' && (
            <div style={{ position: 'fixed', top: 0, left: 0, right: 0, background: '#FEF2F2', color: '#B91C1C', textAlign: 'center', padding: '8px 16px', fontSize: 13, zIndex: 9999 }}>
              Could not load live data — content may be unavailable.
            </div>
          )}
          {children}
        </>
      );
    }

    // ─── APP ROOT ─────────────────────────────────────────────────────────
    function App() {
      const [setupDone, setSetupDone] = useState(() => { try { return !!localStorage.getItem('cc-setup-done'); } catch { return false; } });
      const [activeTab, setActiveTab] = useState('dashboard');
      const [theme, setTheme] = useState(() => {
        try { return localStorage.getItem('sc-theme') || 'light'; } catch { return 'light'; }
      });
      const [profileName, setProfileName] = useState('Lebron James');
      const [profilePhoto, setProfilePhoto] = useState(null);
      const [profileYear, setProfileYear] = useState('Year 2');
      const [profileSpec, setProfileSpec] = useState('Finance');

      useEffect(() => {
        document.documentElement.setAttribute('data-theme', theme);
        try { localStorage.setItem('sc-theme', theme); } catch {}
      }, [theme]);

      const toggleTheme = useCallback(() => setTheme(t => t === 'light' ? 'dark' : 'light'), []);

      const profileProps = { profileName, setProfileName, profilePhoto, setProfilePhoto, profileYear, setProfileYear, profileSpec, setProfileSpec };

      if (!setupDone) return <SetupScreen onDone={() => setSetupDone(true)} />;

      return (
        <div style={{ minHeight: '100dvh', background: 'var(--bg)', display: 'flex', justifyContent: 'center' }}>
          <div style={{ width: '100%', maxWidth: 430, height: '100dvh', display: 'flex', flexDirection: 'column', background: 'var(--bg)', position: 'relative', overflow: 'hidden' }}>
            <div style={{ flex: 1, overflow: 'hidden', position: 'relative' }}>
              {activeTab === 'dashboard' && <DashboardTab theme={theme} onToggleTheme={toggleTheme} profileName={profileName} profilePhoto={profilePhoto} />}
              {activeTab === 'calendar'  && <CalendarTab theme={theme} onToggleTheme={toggleTheme} />}
              {activeTab === 'forum'     && <ForumTab theme={theme} onToggleTheme={toggleTheme} />}
              {activeTab === 'profile'   && <ProfileTab theme={theme} onToggleTheme={toggleTheme} {...profileProps} />}
            </div>
            <BottomNav activeTab={activeTab} onTabChange={setActiveTab} />
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<DataLoader><App /></DataLoader>);
  </script>
</body>
</html>
